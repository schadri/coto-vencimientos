<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4655" />
      <stop offset="100%" stop-color="#ff8533" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" stroke="#334155" stroke-width="8" />
  
  <!-- Outer glowing circle -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#accentGrad)" stroke-width="6" opacity="0.4" stroke-dasharray="12 8" />

  <!-- Calendar Body -->
  <rect x="146" y="156" width="220" height="220" rx="36" fill="#1e293b" stroke="#f8fafc" stroke-width="14" />
  <!-- Calendar Header Bar -->
  <path d="M 146 220 L 366 220" stroke="#f8fafc" stroke-width="14" />
  
  <!-- Calendar Rings -->
  <rect x="190" y="110" width="20" height="70" rx="10" fill="url(#iconGrad)" />
  <rect x="302" y="110" width="20" height="70" rx="10" fill="url(#iconGrad)" />

  <!-- Expiry alert clock / clock symbol inside -->
  <circle cx="256" cy="296" r="50" fill="none" stroke="url(#iconGrad)" stroke-width="12" />
  <!-- Clock Hands -->
  <path d="M 256 260 L 256 296 L 286 296" stroke="#f8fafc" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
</svg>
